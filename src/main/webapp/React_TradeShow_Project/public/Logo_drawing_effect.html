    <!DOCTYPE html>
    <html lang="en">

    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>SVG Drawing Animation</title>
        <style>
            @import url('https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&display=swap');

            /* *, *::before, *::after {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        } */

            :root {
                --bg: transparent;
                --accent: #00ABDA;
                --accent2: #3089AE;
                --glow: rgba(0, 171, 218, 0.35);
                --glow2: rgba(0, 171, 218, 0.12);
            }

            body {
                background: var(--bg);
                min-height: 100vh;
                display: flex;
                flex-direction: column;
                align-items: center;
                justify-content: center;
                font-family: 'Space Mono', monospace;
                overflow: hidden;
            }

            /* Subtle radial glow behind SVG */
            .stage {
                position: relative;
                display: flex;
                align-items: center;
                justify-content: center;
            }

            .stage::before {
                content: '';
                position: absolute;
                width: 520px;
                height: 520px;
                border-radius: 50%;
                /* background: radial-gradient(circle, var(--glow) 0%, transparent 70%); */
                animation: pulse-bg 3s ease-in-out infinite;
                pointer-events: none;
            }

            @keyframes pulse-bg {

                0%,
                100% {
                    opacity: 0.6;
                    transform: scale(0.95);
                }

                50% {
                    opacity: 1;
                    transform: scale(1.05);
                }
            }

            svg.logo {
                position: relative;
                z-index: 1;
                /* filter: drop-shadow(0 0 18px var(--glow)) drop-shadow(0 0 5px var(--glow)); */
                /* animation: float 5s ease-in-out infinite; */
            }

            @keyframes float {

                0%,
                100% {
                    transform: translateY(0px);
                }

                50% {
                    transform: translateY(-10px);
                }
            }

            /* All paths start invisible (stroke drawn, fill hidden) */
            svg.logo path {
                fill: none;
                stroke: var(--accent);
                stroke-width: 1.2;
                stroke-linecap: round;
                stroke-linejoin: round;
                opacity: 0;
                transition: opacity 0.05s;
            }

            /* Label */
            .label {
                margin-top: 36px;
                color: var(--accent2);
                font-size: 11px;
                letter-spacing: 0.35em;
                text-transform: uppercase;
                opacity: 0;
                animation: fade-label 1s ease forwards;
                animation-delay: 0.5s;
            }

            @keyframes fade-label {
                to {
                    opacity: 0.55;
                }
            }

            /* Scanline overlay for mood */
            /* body::after {
            content: '';

            );
            pointer-events: none;
            z-index: 100;
        } */
        </style>
    </head>

        <script>
            // SVG path drawing animation using stroke-dasharray/stroke-dashoffset
            // Each path draws in sequence, then the whole thing fades to filled color, then resets

            const paths = document.querySelectorAll('svg.logo path');
            const DRAW_DURATION = 1800; // ms per path
            const FILL_DURATION = 600;  // ms to fade into filled
            const HOLD_DURATION = 1200; // ms to hold fully filled
            const FADE_DURATION = 500;  // ms to fade out before reset
            const PAUSE_BETWEEN = 80;   // ms stagger between paths

            // Original fills from the SVG
            const originalFills = [
                '#00ABDA', '#00ABDA', '#00ABDA', '#00ABDA'
            ];

            // Measure each path length
            const lengths = Array.from(paths).map(p => p.getTotalLength());

            // Initialise all paths
            function initPaths() {
                paths.forEach((p, i) => {
                    p.style.transition = 'none';
                    p.style.fill = originalFills[i] || '#00ABDA';
                    p.style.fillOpacity = '0';
                    p.style.stroke = '#00ABDA';
                    p.style.strokeWidth = '1.2';
                    p.style.opacity = '1';
                    p.style.strokeDasharray = `${lengths[i]}`;
                    p.style.strokeDashoffset = `${lengths[i]}`;
                });
            }

            function sleep(ms) {
                return new Promise(r => setTimeout(r, ms));
            }

            async function drawPath(p, len, drawDuration) {
                return new Promise(resolve => {
                    p.style.opacity = '1';
                    p.style.transition = `stroke-dashoffset ${drawDuration}ms cubic-bezier(0.4,0,0.2,1)`;
                    p.style.strokeDashoffset = '0';
                    setTimeout(resolve, drawDuration);
                });
            }

            async function fillPaths() {
                // Transition stroke → fill
                paths.forEach((p, i) => {
                    p.style.transition = `fill-opacity ${FILL_DURATION}ms cubic-bezier(0.4,0,0.2,1), stroke-width ${FILL_DURATION}ms ease, opacity ${FILL_DURATION}ms ease`;
                    p.style.fillOpacity = '1';
                    p.style.strokeWidth = '0';
                });
                await sleep(FILL_DURATION);
            }

            async function fadeOut() {
                paths.forEach(p => {
                    p.style.transition = `opacity ${FADE_DURATION}ms ease`;
                    p.style.opacity = '0';
                });
                await sleep(FADE_DURATION);
            }

            async function animate() {
                while (true) {
                    initPaths();
                    await sleep(100); // let init settle

                    // Draw paths with slight stagger
                    const drawPromises = Array.from(paths).map((p, i) =>
                        sleep(i * PAUSE_BETWEEN).then(() => drawPath(p, lengths[i], DRAW_DURATION))
                    );
                    await Promise.all(drawPromises);
                    await sleep(300);

                    // Fill with color
                    await fillPaths();
                    await sleep(HOLD_DURATION);

                    // Fade out
                    await fadeOut();
                    await sleep(200);
                }
            }

            animate();
        </script>
